body:
  text: 滄浪詩話宋嚴羽撰詩辨禪家者流乘有小大宗有南北道有邪正學者須從最上乘具正法眼悟第一義若小乘禪聲聞辟支果皆非正也論詩如論禪漢魏晉與盛唐之詩則第一義也大厯以還之詩則小乘禪也已落第二義矣晚唐之詩則聲聞辟支果也學漢魏晉與盛唐詩者臨濟下也學大厯以還之詩者曹洞下也大抵禪道惟在妙悟詩道亦在妙悟且孟襄陽學力下韓退之逺甚而其詩獨出退之之上者一味妙悟而巳惟悟乃為當行乃為本色然悟有淺深有分限有透徹之悟有但得一知半解之悟漢魏尚矣不假悟也謝靈運至盛唐諸公透徹之悟也他雖有悟者皆非第一義也吾評之非僣也辨之非妄也天下有可廢之人無可廢之言詩道如是也若以為不然則是見詩之不廣參詩之不熟耳試取漢魏之詩而熟參之次取晉宋之詩而熟參之次取南北朝之詩而熟參之次取沈宋王楊盧駱陳拾遺之詩而熟參之次取開元天寶諸家之詩而熟參之次獨取李杜二公之詩而熟參之又盡取晚唐諸家之詩而熟參之又取本朝蘇黃以下諸家之詩而熟參之其真是非自有不能隱者儻猶於此而無見焉則是野狐外道蒙蔽其真識不可救藥終不悟也夫學詩者以識為主入門須正立志須髙以漢魏晉盛唐為師不作開元天寶以下人物若自退屈即有下劣詩魔入其肺腑之間由立志之不髙也行有未至可加工力路頭一差愈騖愈逺由入門之不正也故曰學其上僅得其中學其中斯為下矣又曰見過於師僅堪傳授見與師齊減師半德也工夫須從上做下不可從下做上先須熟讀楚詞朝夕風詠以為之本及讀古詩十九首樂府四篇李陵蘇武漢魏五言皆須熟讀即以李杜二集枕藉觀之如今人之治經然後博取盛唐名家醖釀胸中久之自然悟入雖學之不至亦不失正路此乃是從頂𩕳上做來謂之向上一路謂之直截根源謂之頓門謂之單刀直入也詩之法有五曰體製曰格力曰氣象曰興趣曰音節詩之品有九曰髙曰古曰深曰逺曰長曰雄渾曰飄逸曰悲壯曰凄婉其用工有三曰起結曰句法曰字眼其大槩有二曰優游不迫曰沉著痛快詩之極致有一曰入神詩而入神至矣盡矣蔑以加矣惟李杜得之他人得之蓋寡也夫詩有别材非關書也詩有别趣非關理也然非多讀書多窮理則不能極其至所謂不涉理路不落言筌者上也詩者吟詠情性也盛唐諸人惟在興趣羚羊掛角無跡可求故其妙處透徹玲瓏不可湊泊如空中之音相中之色水中之月鏡中之象言有盡而意無窮近代諸公乃作奇特解㑹遂以文字為詩以才學為詩以議論為詩夫豈不工終非古人之詩也蓋於一唱三歎之音有所歉焉且其作多務使事不問興致用字必有來歷押韻必有出處讀之反覆終篇不知著到何在其末流甚者呌噪怒張殊乖忠厚之風殆以罵詈為詩詩而至此可謂一厄也然則近代之詩無取乎曰有之吾取其合於古人者而已國初之詩尚㳂襲唐人王黃州學白樂天楊文公劉中山學李商隱盛文肅學韋蘇州歐陽公學韓退之古詩梅聖俞學唐人平淡處至東坡山谷始自出已意以為詩唐人之風變矣山谷用工尤為深刻其後法席盛行海內稱為江西宗𣲖近世趙紫芝翁靈舒輩獨喜賈島姚合之詩稍稍復就清苦之風江湖詩人多效其體一時自謂之唐宗不知止入聲聞辟支之果豈盛唐諸公大乘正法眼者哉嗟乎正法眼之無傳久矣唐詩之說未唱唐詩之道或有時而明也今既唱其體曰唐詩矣則學者謂唐詩誠止於是耳得非詩道之重不幸邪故豫不自量度輒定詩之宗㫖且借禪以為喻推原漢魏以來而截然謂當以盛唐為法後捨漢魏而獨言盛唐者謂古律之體備也雖獲罪於世之君子不辭也詩體風雅頌既亡一變而為離騷冉變而為西漢五言三變而為歌行雜體四變而為沈宋律詩五言起於李陵蘇武或云枚乘七言起於漢武柏梁四言起於漢楚王傅韋孟六言起於漢司農谷永三言起於晉夏侯湛九言起於髙貴鄉公以時而論則有建安體漢末年號曹子建父子及鄴中七子之詩黃初體魏年號與建安相接其體一也正始體魏年號嵇阮諸公之詩太康體晉年號左思潘嶽二張二陸諸公之詩元嘉體宋年號顏鮑謝諸公之詩永明體齊年號齊諸公之詩齊梁體通兩朝而言之南北朝體通魏周而言之與齊梁體一也唐初體唐初猶襲陳隋之體盛唐體景雲以後開元天寶諸公之詩大厯體大厯十才子之詩元和體元白諸公晚唐體本朝體通前後而言之元祐體蘇黃陳諸公江西宗𣲖體山谷為之宗以人而論則有蘇李體李陵蘇武也曹劉體子建公幹也陶體淵明也謝體靈運也徐庾體徐陵庾信也沈宋體佺期之問也陳拾遺體陳子昻也王楊盧駱體王勃楊炯盧照鄰駱賔王張曲江體始興文獻公九齡也少陵體太白體髙逹夫體髙常侍適也孟浩然體岑嘉州體岑參也王右丞體王維也韋蘇州體韋應物也韓昌黎體柳子厚體韋柳體蘇州與儀曹合言之李長吉體李商隱體即西崑體也盧同體白樂天體元白體微之樂天其體一也杜牧之體張藉王建體謂樂府之體同也賈浪仙體孟東野體杜荀鶴體東坡體山谷體后山體后山本學杜其語似之者但數篇他或似而不全又其他則本其自體耳王荆公體公絶句最髙其得意處髙出蘇黃陳之上而與唐人尚隔一關邵康節體陳簡齊體陳去非與義也亦江西之𣲖而小異楊誠齊體其初學半山后山最後亦學絶句於唐人巳而盡棄諸家之體而别出機杼蓋其自序如此也又有所謂選體選詩時代不同體製隨異今人例謂五言古詩為選體非也柏梁體漢武帝與羣臣共賦七言每句用韻後人謂此體為柏梁體玉臺體玉臺集乃徐陵所序漢魏六朝之詩皆有之或者但謂纎艷者為玉臺體其實則不然西崑體即李商隱體然兼溫庭筠及本朝楊劉諸公而名之也香奩體韓偓之詩皆裾裙脂粉之語有香奩集宫體梁簡文傷於輕靡時號宫體其他體製尚或不一然大槩不出此耳有古詩有近體即律詩也有絶句有雜言有三五七言自三言而終以七言隋鄭世翼有此詩秋風清秋月明落葉聚還散寒鴉棲復驚相思相見知何日此日此夜難為情有半五六言晉傳𤣥鴻雁生塞北之篇是也有一字至七字唐張南史雪月花草等篇是也又隋人應詔有三十字凡三句七言一句九言不足為法故不列於此也有三句之歌髙祖大風歌是也古華山畿二十五首多三句之詞其他古人詩多如此者有兩句之歌荆卿易水歌是也又古詩有青驄白馬共戲樂女兒子之類皆兩句之詞也有一句之歌漢書枹鼓不鳴董少年一句之歌也又漢童謡千乘萬騎上北邙梁童謡青絲白馬夀陽來皆一句也有口號或四句或八句有歌行古有鞠歌行放歌行長歌行短歌行又有單以歌名者行名者不可枚述有樂府漢成帝定郊祀立樂府採齊楚趙魏之聲以入樂府以其音詞可被於絃歌也樂府俱被衆體兼統衆名也有楚詞屈原以下倣楚詞者皆謂之楚詞有琴操古有水仙操辛德源所作别鶴操髙陵牧子所作有謡沈炯有獨酌謡王昌齡有箜篌謡穆天子之傳有白雲謡也曰吟古詞有隴頭吟孔明有梁父吟相如有白頭吟曰詞選有漢武秋風詞樂府有木蘭詞曰引古曲有霹靂引走馬引飛龍引曰詠選有五君詠唐儲光羲有羣鴻詠曰曲古有大堤曲梁簡文有烏棲曲曰篇選有名都篇京洛篇白馬篇曰唱魏武帝有氣出唱曰弄古樂府有江南弄曰長調曰短調有四聲有八病四聲設於周顒八病嚴於沈約八病謂平頭上尾蜂腰鶴膝大韻小韻旁紐正紐之辨作詩正不必拘此蔽法不足據也又有以歎名者古詞有楚妃歎明君歎以愁名者文選有四愁樂府有獨處愁以哀名者選有七哀少陵有八哀以怨名者古詞有寒夜怨玉階怨以思名者太白有靜夜思以樂名者齊武帝有估客樂宋臧質有石城樂以别名者子美有無家别垂老别新婚别有全篇雙聲疊韻者東坡經字韻詩是也有全篇字皆平聲者天隨子夏日詩四十字皆是平又有一句全平一句全仄者有全篇字皆仄聲者梅聖俞酌酒與婦飲之詩是也有律詩上下句雙用韻者第一句第三五七句押一仄韻第二句第四六八句押一平韻者唐章碣有此體不足為法謾列於此以備其體耳又有四句平入之體四句仄入之體無關詩道今皆不取有轆轤韻者雙出雙入有進有退韻者一進一退有古詩一韻兩用者文選曹子建美女篇有兩難字謝康樂述祖德詩有兩人字後多有之有古詩一韻三用者文選任彥升哭范僕射詩三用情字也有古詩三韻六七用者古焦仲卿妻詩是也有古詩重用二十許韻者焦仲卿妻詩是也有古詩旁取六七許韻者韓退之此日足可惜篇是也凡雜用東冬江陽庚青六韻歐陽公謂退之遇寬韻則故旁入他韻非也此乃用古韻耳於集韻自見之有古詩全不押韻者古採蓮曲是也有律詩至百五十韻者少陵有百韻律詩白樂天亦有之而本朝王黃州有百五十韻五言律有律詩止三韻者唐人有六句五言律如李益詩漢家今上郡秦塞古長城有日雲常慘無風沙自驚當今天子聖不戰四方平是也有律詩徹首尾對者少陵多此體不可概舉有律詩徹首尾不對者盛唐諸公有此體如孟浩然詩掛席東南望青山水國遙軸轤爭利涉來往接風潮問我今何適天台訪石橋坐看霞色晚疑是石城標又水國無邊際之篇又太白牛渚西江夜之篇皆文從字順音韻鏗鏘八句皆無對偶有後章字接前章者曹子建贈白馬王彪之詩是也有四句通義者如少陵神女峰姢妙昭君宅有無曲留明怨惜夢盡失歡娛是也有絶句折腰者有八句折腰者有擬古有連句有集句有分題古人分題或各賦一物如云送某人分題得某物也或曰探題有分韻有用韻有和韻有借韻如押七之韻可借八微或十二齊韻是也有協韻楚詞及選詩多用協韻有今韻有古韻如退之此日足可惜詩用古韻也蓋選詩多如此有古律陳子昻及盛唐諸公多此體有今律有頷聫有頸聫有發端有落句結句也有十字對劉春虗滄浪千五里日夜一孤舟有十字句常建一徑通幽處禪房花木深等是也有十四字對劉長卿江客不堪頻北望塞鴻何事又南飛是也有十四字句崔皓黃鶴一去不復返白雲千載空悠悠又太白鸚鵡西飛隴山去芳洲之樹何青青是也有扇對又謂之隔句對如鄭都官昔年共照松溪影松折碑荒僧巳無今日還思錦城事雪消花謝夢何如是也蓋以第一句對第三句第二句對第四句有借對孟浩然厨人具雞黍稚子摘楊梅太白水舂雲母碓風掃石楠花少陵竹葉於人既無分菊花從此不須開是也有就句對又曰當句有對如少陵小院回廊春寂寂浴鳬飛鷺晚悠悠李嘉祐孤雲獨鳥川光暮萬里千山海氣秋是也前輩於文亦多此體如王勃龍光射斗牛之墟徐孺下陳蕃之榻乃就對也論雜體則有風人上句述其語下句釋其義如古子夜歌續曲歌之類則多用此體藁砧古樂府藁砧今何在山上復安山何當大刀頭破鏡飛上天僻辭隱語也五雜爼見樂府兩頭纎纎亦見樂府盤中玉臺集有此詩蘇伯玉妻作寫之盤中屈曲成文也回文起於竇滔之妻織錦以寄其夫也反覆舉一字而誦皆成句無不押韻反覆成文也李公詩格有此二十一字詩離合字相折合成文孔融漁父屈節之詩是也雖不關詩之重輕其體製亦古建除鮑明逺有建除詩每句首冠以建除平定等字其詩雖佳蓋鮑本工詩非因建除之體而佳也字謎人名卦名數名藥名州名如此詩只成戲謔不足法也又有六甲十屬之類及藏頭歇後等體今皆削之近世有李公詩格泛而不備惠洪天厨禁臠最為誤人今此卷有旁參二書者蓋其是處不可易也詩法學詩先除五俗一曰俗體二曰俗意三曰俗句四曰俗字五曰俗韻有語忌有語病語病易除語忌難除語病古人亦有之惟語忌則不可有須是本色須是當行對句好可得結句好難得發句好尤難得發端忌作舉止收拾貴在出場不必太著題不必多使事押韻不必有出處用事不必拘來歷下字貴響造語貴圓意貴透徹不可隔靴搔癢語貴脫灑不可拖泥帶水最忌骨董最忌趂貼語忌直意忌淺脉忌露味忌短音韻忌散緩亦忌迫促詩難處在結裹譬如番刀須用北人結裹若南人便非本色須參活句勿參死句詞氣可頡頏不可乖戾律詩難於古詩絶句難於八句七言律詩難於五言律詩五言絶句難於七言絶句學詩有三節其初不識好惡連篇纍牘肆筆而成既識羞愧始生畏縮成之極難及其透徹則七縱八橫信手拈來頭頭是道矣看詩須著金剛眼睛庶不眩於旁門小法禪家有金剛眼睛之說辨家數如辨蒼白方可言詩荆公評文章先體製而後文之工拙詩之是非不必爭試以已詩置之古人詩中與識者觀之而不能辨則真古人矣詩評大厯以前分明别是一副言語晚唐分明别是一副言語本朝諸公分明别是一副言語如此見方許具一隻眼盛唐人有似粗而非粗處有似拙而非拙處五言絶句衆唐人是一樣少陵是一樣韓退之是一樣王荆公是一樣本朝諸公是一樣盛唐人詩亦有一二濫觴晚唐者晚唐人詩亦有一二可入盛唐者要當論其大槩耳唐人與本朝人詩未論工拙直是氣象不同唐人命題言語亦自不同雜古人之集而觀之不必見詩望其題引而知其為唐人今人矣大厯之詩髙者尚未識盛唐下者漸入晚唐矣晚唐之下者亦隨野孤外道鬼窟中或問唐詩何以勝我朝唐以詩取士故多專門之學我朝之詩所以不及也詩有詞理意興南朝人尚詞而病於理本朝人尚理而病於意興唐人尚意興而理在其中漢魏之詩詞理意興無迹可求漢魏古詩氣象混沌難以句摘晉以還方有佳句如淵明採菊東籬下悠然見南山謝靈運池塘生春草之類謝所以不及陶者康樂之詩精工淵明之詩質而自然耳謝靈運之詩無一篇不佳黃初之後惟阮籍詠懷之作極為髙古有建安風骨晉人舍陶淵明阮籍嗣宗外惟左太沖髙出一時陸士衡獨在諸公之下顔不如鮑鮑不如謝文中子獨取顏非也建安之作全在氣象不可尋枝摘葉靈運之詩已是徹首尾成對句矣是以不及建安也謝朓之詩已有全篇似唐人者當觀其集方知之戎昱在盛唐為最下巳濫觴晚唐矣戎昱之詩有絶似晚唐者權德輿之詩却有絶似盛唐者權德輿或有似韋蘇州劉長卿處冷朝陽在大厯才子中為最下馬戴在晚唐諸人之上劉滄吕溫亦勝諸人李瀕不全是晚唐間有似劉隨州處陳陶之詩在晚唐人中最無可觀薛逢最淺俗大厯以後吾所深取者李長吉柳子厚劉言史權德輿李涉李益耳大厯後劉夢得之絶句張藉王建之樂府吾所深取耳李杜二公正不當優劣太白有一二妙處子美不能道子美有一二妙處太白不能作子美不能為太白之飄逸太白不能為子美之沉鬱太白夢遊天姥吟逺離别等子美不能道子美北征兵車行垂老别等太白不能作論詩以李杜為準挾天子以令諸侯也少陵詩法如孫吳太白詩法如李廣少陵如節制之師少陵詩憲章漢魏而取材於六朝至其自得之妙則前輩所謂集大成者也觀太白詩者要識真太白處太白天才豪逸語多卒然而成者學者於每篇中要識其安身立命處可也太白發句謂之開門見山李杜數公如金鳷擘海香象渡河下視郊島輩直蟲吟草間耳人言太白仙才長吉鬼才不然太白天仙之詞長吉鬼仙之詞耳玉川之怪長吉之瑰詭天地間自缺此體不得髙岑之詩悲壯讀之使人感慨孟郊之詩刻苦讀之使人不歡楚詞惟屈宋諸篇當讀之外惟賈誼懷長沙淮南王招隱操嚴夫子哀時命宜熟讀此外亦不必也九章不如九歌九歌哀郢尤妙前輩謂大招勝招魂不然讀騷之久方識真味須歌之抑揚涕洟滿襟然後為識離騷否則如戞釜撞甕耳唐人惟柳子厚深得騷學退之李觀皆所不及若皮日休九諷不足為騷韓退之琴操極髙古正是本色非唐賢所及釋皎然之詩在唐諸僧之上唐詩僧有法震法照無可護國靈一清江無本齊已貫休也集句唯荆公最長胡笳十八拍混然天成絶無痕迹如蔡文姬肺肝間流出擬古惟江文通最長擬淵明似淵明擬康樂似康樂擬左思似左思擬郭璞似郭璞獨擬李都尉一首不似西漢耳雖謝康樂擬鄴中諸子之詩亦氣象不類至於劉𤣥休擬行行重行行等篇鮑明逺代君子有所思之作仍是其自體耳和韻最害人詩古人酬唱不次韻此風始盛於元白皮陸本朝諸賢乃以此而鬬工遂至往復有八九和者孟郊之詩憔悴枯槁其氣局促不伸退之許之如此何耶詩道本正大孟郊自為之艱阻耳孟浩然之詩諷詠之久有金石宫商之聲唐人七言律詩當以崔灝黃鶴樓為第一唐人好詩多是征戍遷謫行旅離别之作往往能感動激發人意蘇子卿詩幸有絃歌曲可以喻中懷請為遊子吟泠泠一何悲絲竹屬清聲慷慨有餘哀長歌正激烈中心愴以摧欲展清商曲念子不能歸今人觀之必以為一篇重復之甚豈特如蘭亭絲竹管絃之語耶古詩正不當以此論之也十九首青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窗牖娥娥紅粉粧纎纎出素手一連六句皆用疊字今人必以為句法重復之甚古詩正不當以此論之也任昉哭范僕射詩一首中凡兩用生字韻三用情字韻夫子值狂生千齡萬恨生猶是兩義猶我故人情生死一交情欲以遣離情三情字皆用一意天厨禁臠謂平韻可重押若或平或仄則不可彼但以八仙歌言之耳何見之陋邪詩話謂東坡兩耳韻兩耳義不同故可重押要之亦非也劉公幹贈五官中郎將詩昔我從元后整駕至南鄉過彼豐沛都與君共翺翔元后蓋指曹操也至南鄉謂伐劉表之時豐沛都喻操譙郡也王仲宣從軍詩云籌䇿運帷幄一由我聖君聖君亦指曹操也又曰竊慕負鼎翁願厲朽鈍姿是欲效伊尹負鼎於湯以伐桀也是時漢帝尚存而二子之言如此一曰元后二曰聖君正與荀彧比曹操為髙光同科或以公幹平視美人為不屈是未為知人之論春秋誅心之法二子其何逃古人贈答多相勉之詞蘇子卿云願君崇令德隨時愛景光李少卿云努力崇明德皓首以為期劉公幹云勉哉修令德北面自寵珍杜子美云君若登台輔臨危莫愛身往往是此意有如髙達夫贈王徹云吾知十年後季子多黃金金多何足道又甚於以名位期人者此達夫偶然漏逗處也考證少陵與太白獨厚於諸公詩中凡言太白十四處至謂世人皆欲殺吾意獨憐才醉眠秋共被攜手日同行三夜頻夢君情親見君意其情好可想遁齊間覽謂二人名既相逼不能無相忌是以庸俗之見而度賢哲之心也豫故不得不辨古詩十九首非止一人之詩也行行重行行樂府以為枚乘之作則其他可知矣古詩十九首行行重行行玉臺作兩首自越鳥巢南枝以下别為一首當以選為正文選長歌行只有一首青青園中葵者郭茂倩樂府有兩篇次一首乃仙人騎白鹿者仙人騎白鹿之篇豫疑此詞岧岧山上亭以下其義不同當又别是一首郭茂倩不能辨也文選飲馬長城窟古詞無人名玉臺以為蔡雍作古詞之不可讀者莫如巾舞歌文義漫不可解又古將進酒芳樹石留豫章行等篇皆使人讀之茫然又朱鷺稚子斑艾如張思悲翁上之回等只二三句可解豈非嵗久文字舛訛而然耶木蘭歌促織何唧唧文苑英華作唧唧何切切又作歷歷樂府作唧唧復唧唧又作促織何唧唧當從樂府也願馳千里足郭茂倩樂府作願借明駝千里足酉陽雜爼作願馳千里明駝足漁隱不考妄為之辨木蘭歌最古然朔氣傳金柝寒光照鐵衣之類已似太白必非漢魏人詩也木蘭歌文苑英華直作韋元甫名字郭茂倩樂府有兩篇其後篇乃元甫所作也班媫妤怨歌行文選直作班姬之名樂府以為顏延年作孔明梁父吟步出齊東門遙望蕩隂里樂府解題作遙望隂陽里青州有隂陽里田疆古冶子解題作田疆固野子南北朝人惟張正見詩最多而最無足省發所謂雖多亦奚以為西清詩話載朝文元家所藏陶詩有問來使一篇云爾從山中來早晚發天目我屋南山下今生幾藂菊薔薇葉巳抽秋蘭氣當馥歸去來山中山中酒應熟豫謂此篇誠佳然其體製氣象與淵明不類得非太白逸詩後人謾取以入陶集爾文苑英華有太白代寄翁參樞先輩七言律一首乃晚唐之下者又有五言律三首其一送客歸吳其二送友生遊峽中其三送袁明甫任長江集本皆無之其家數在大厯貞元間亦非太白之作又有五言雨後望月一首對雨一首望夫石一首冬月歸舊山一首皆晚唐之語又有秦樓出佳麗四句亦不類太白皆是後人假名也文苑英華有送史司馬赴崔相公幕一首云峥嶸丞相府清切鳳凰池羡爾瑶臺鶴髙棲瓊樹枝歸飛晴日好吟弄惠風吹正有乘軒樂初當學舞時珍禽在羅網微命若遊絲願托周周羽相銜漢水湄此或太白之逸詩也不然亦是盛唐人之作太白集中少年行只有數句類太白其他皆淺近浮俗决非太白所作必誤入也迎旦東風騎蹇驢决非盛唐人氣象只似白樂天言語今世俗圖畫以為少陵詩漁隱亦辨其非矣而黃伯思編入杜集非也少陵有避地逸詩一首云避地嵗時晚竄身筋骨勞詩書遂墻壁奴僕且旌旄行在僅聞信此生隨所遭神堯舊天下㑹見出腥臊題下公自注云至德三載丁酉作此則真少陵語也今書市集本並不見有舊蜀本杜詩並無注釋雖編年而不分古近二體其間略有公自注而巳今豫章庫本以為翻鎮江蜀本雖分雜注又分古律其編年亦且不同近寶慶間南海漕臺開杜集亦以為蜀本雖刪去假坡之注亦有王原叔以下九家而趙注比他本最詳皆非舊蜀本也杜集注中坡曰者皆是托名假僞漁隱雖嘗辨之而人尚疑者蓋無至當之說以指其僞也今舉一端將不辨而自明矣如楚岫入峰翠注云景差蘭亭春望千峰楚岫碧萬木郢城隂且五言始於李陵蘇武或云枚乘漢以前五言古詩尚未有之寧有戰國時巳有五言律句耶觀此可以一笑而悟矣雖然亦幸而有此漏逗也杜注中師曰者亦坡曰之類但其間半僞半真尤為殽亂惑人此深可歎然具眼者自默識之耳崔灝渭城少年行百家選作兩首自秦川巳下别為一首郭茂倩樂府止作一首文苑英華亦止作一首當從樂府英華為是矣玉川子天下薄夫苦耽酒之詩荆公百家詩選止作一篇本集自天上白日悠悠懸以下别為一首當從荆公為是太白詩斗酒渭城邊壚頭耐醉眠乃岑參之詩誤入太白塞上曲駵馬新誇紫玉鞍者乃王昌齡之詩亦誤入昌齡本有二篇前集乃秦時明月漢時關也孟浩然有贈孟郊一首按東野乃貞元元和間人而浩然終於開元二十八年時代懸逺其詩亦不似浩然必誤入杜詩五雲髙太甲六月曠摶扶太甲之義殆不可曉得非髙太乙耶乙為甲蓋亦相近以星對風亦從其類也至於杳杳東山携漢妓亦無義理疑是携妓去蓋子美每於絶句喜對偶耳臆度如此更俟宏識王荆公百家詩選蓋本於唐人英靈間氣集其初明皇德宗薛稷劉希夷韋述之詩無少增損次序亦同孟浩然止增其數儲光羲後方是荆公自去取前卷讀之盡佳非其選擇之精蓋盛唐人詩無不可觀者至於大厯巳後其去取深不滿人意況唐人如沈宋王楊盧駱陳拾遺張燕公張曲江賈至王維獨孤及韋應物孫逖祖詠劉眘虗綦毋潜劉長卿李長吉諸公皆大名家李杜韓柳以家有其集故不載而此集無之荆公當時所選當據宋次道之所有耳其序乃言觀唐詩者觀此足矣豈不誣哉今人但以荆公所選斂袵而莫敢議可歎也荆公有一家但取一二首而不可讀者如曹唐二首其一首云年少風流好丈夫大家望拜漢金吾閒眠曉日聽啼鴂笑倚春風仗轆轤深院吹笙從漢婢靜街調馬任夷奴牡丹花下鈎簾畔獨倚紅肌捋虎鬚此不足以書屏幛可以與閭巷小人文背之詞又買劒一首云青天露拔雲霓泣黑地潜驚鬼魅愁但可與師巫念誦耳豫嘗見方子通墓志唐詩有八百家子通所藏有五百家今則世不見有惜哉柳子厚漁翁夜傍西巖宿之詩東坡刪去後二句使子厚復生亦必心服謝朓洞庭張樂地瀟湘帝子遊雲去蒼梧野水還江漢流停驂我悵望輟棹子夷猶廣平聽方籍茂陵將見求心事俱巳矣江上徒離憂豫謂廣平聽方籍茂陵將見求一聫刪去只用八句尤為渾然不知識者以為何如附答出繼叔臨安吳景仙書按他本滄浪答吳保義手書吳陵字景先表叔行有詩名僕之詩辨乃斷千百年公案誠驚世絶俗之談至當歸一之論其間說江西詩病真取心肝劊子手以禪喻詩莫此親切是自家實證實悟者是自家閉門鑿破此片田地即非傍人籬壁拾人涕唾得來者李杜復生不易吾言矣而吾叔靳靳疑之況他人乎所見難合固如此深可歎也吾叔謂說禪非文人儒者之言本意但欲說得詩透徹初無意於為文其合文人儒者之言與否不問也髙意又使回護毋直致褒貶僕意謂辨白是非定其宗㫖正當明目張膽而言使其詞說沉著痛快深切著明顯然易見所謂不直則道不見雖得罪於世之君子不辭也吾叔詩說其文雖勝然只是說詩之源流世變之髙下耳雖取盛唐而無的然使人知所趨向處其間異户同門之說乃一篇之要領然晚唐本朝謂其如此可也謂唐初以來至大厯之詩異户同門巳不可矣至於漢魏晉宋齊梁之詩其品第相去髙下懸絶乃混而稱之謂錙銖而較實有不同處大率異户而同門豈其然乎又謂韓柳不得為盛唐猶未落晚唐以其時則可矣韓退之固當别論若柳子厚五言古詩尚在章蘇州之上豈元白同時諸公所可望耶髙見如此毋怪來書有甚不喜分諸體製之說吾叔誠於此未瞭然也作詩正須辨盡諸家體製然後不為旁門所惑今人作詩差入門户者正以體製莫辨也世之技藝猶各有家數市縑帛者必分道地然後知優劣況文章乎僕於作詩不敢自負至識則自謂有一日之長於古今體製若辨蒼素甚者望而知之來書又謂忽被人捉破發問何以答之僕正欲人發問而不可得者不遇盤根安别利器吾叔試以數十篇詩隱其姓名舉以相試為能别得體製否惟辨之未精故所作惑雜而不純今觀盛集中尚有一二本朝立作處毋乃坐是而然耶又謂盛唐之詩雄深雅健僕謂此四字但可評文於詩則用健字不得不若詩辨雄渾悲壯之語為得詩之體也毫釐之差不可不辨坡谷諸公之詩如米元章之字雖筆力徑健終有子路事夫子時氣象盛唐諸公之詩如顏魯公書既筆力雄壯又氣象渾厚其不同如此只此一字便見吾叔腳根未㸃地處也所論屈原離騷則深得之實前輩之所未發此一假文亦甚佳大槩論武帝以前皆好無可議者但李陵之詩非虜中感故人還漢而作恐未深考故東坡亦惑江漢之語疑非少卿之詩而不考其胡中也妙喜是徑山名僧宗杲也自謂參禪精子僕亦自謂參詩精子嘗謁李友山論古今人詩見僕辨析毫芒每相激賞因謂之曰吾論詩若那查太子析骨還父析肉還母友山深以為然當時臨川相㑹匆匆所惜多順情放過蓋傾蓋執手無暇引惹恐未能卒竟其辨也鄙見若此若不以為然却願有以相復幸甚滄浪詩話
