body:
  text: 滄浪詩話詩文評類提要臣等謹按滄浪詩話一卷宋嚴羽撰羽字丹丘一字儀卿自號滄浪逋客邵武人與嚴仁嚴參號三嚴又與嚴粲號二嚴戴式之石屏集有贈二嚴詩所謂前年得嚴粲今年得嚴羽自我得二嚴牛鐸諧鍾吕者是也是書一名滄浪吟卷蓋閩中刋本以詩話置詩集之前為第一卷故襲其詩集之名耳首詩辨次詩體次詩法次詩評次考證凡五門末附與吳景􅋖論詩書大旨取盛唐為宗主於妙悟故以如空中音如相中色如鏡中花如水中月如羚羊挂角無迹可尋為詩家之極則明胡應麟比之達摩西來獨闢禪宗而馮班作嚴氏糾謬一卷至詆為囈語平情以論宋代之詩喜涉理路多未能比興深微又當羽之時四靈之派盛行世方以晚唐相尚故為此一家之言以救一時之弊後人輾轉承流漸至于浮光掠影初非羽之所及知譽者太過毁者亦太過矣錢曾讀書敏求記又摘其九章不如九歌九歌哀郢尤妙之語以為九歌之內無哀郢詆羽未讀離騷然此或一時筆誤或傳寫有訛均未可定曾遽加輕詆未免佻薄如趙宧光於六書之學固為弇陋然説文長箋引虎兕出於柙句誤稱孟子其過當在鈔胥顧炎作日知録遽謂其未讀論語豈足服其心乎是皆吹索之見未足定此書之是非也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b49c90dc4e93908f10b5575ad1edfb3d8046ef8506303b85f0d434ed5cb7d4c7
